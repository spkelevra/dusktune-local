name: dusktune
description: A minimalist dark-mode music player for local audio files.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  on_audio_query: ^2.9.0
  id3: 1.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  audioplayers: ^6.5.0
  permission_handler: ^12.0.3
  ambient_light: ^0.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/logo-1024.png"
  adaptive_icon_foreground: "assets/icons/logo-1024.png"
  adaptive_icon_background: "#000000"
  windows:
    generate: true
    image_path: assets/icons/logo-1024.png
  macos:
    generate: true
    image_path: assets/icons/logo-1024.png
