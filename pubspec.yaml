name: dusktune
description: A minimalist dark-mode music player for local audio files.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  on_audio_query: ^2.9.0
  id3: 1.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  audioplayers: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
