name: dusktune
description: A minimalist dark-mode music player for local audio files.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  mpv_audio_kit:
    git:
      url: https://github.com/spkelevra/mpv_audio_kit.git
      ref: experiment/ytdl-enabled
  on_audio_query:
    git:
      url: https://github.com/spkelevra/on_audio_query.git
      path: packages/on_audio_query
  id3: 1.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  ambient_light: ^0.1.4
  phosphoricons_flutter: ^1.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  on_audio_query_android:
    git:
      url: https://github.com/spkelevra/on_audio_query.git
      path: packages/on_audio_query_android

flutter:
  uses-material-design: true
flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/logo-1024.png"
  adaptive_icon_foreground: "assets/icons/logo-1024.png"
  adaptive_icon_background: "#000000"
  windows:
    generate: true
    image_path: assets/icons/logo-1024.png
  macos:
    generate: true
    image_path: assets/icons/logo-1024.png
